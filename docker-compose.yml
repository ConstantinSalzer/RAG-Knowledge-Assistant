services:
  # --- Database ---
  postgres:
    image: ankane/pgvector:latest
    container_name: rag_postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
    ports:
      - "5432:5432"
    volumes:
      - ./data/pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- AI Engine (Ollama) ---
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    healthcheck:
      # Native check: uses the ollama CLI to verify the server is responding
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"

  ollama-pull-models:
    # Use the same image to ensure the 'ollama' CLI is available
    image: ollama/ollama:latest
    container_name: ollama_pull_models
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Pulling models..."
        export OLLAMA_HOST=http://ollama:11434
        /usr/bin/ollama pull nomic-embed-text
        /usr/bin/ollama pull qwen2.5:1.5b
        /usr/bin/ollama pull qwen2.5:7b
        echo "All models downloaded."
        
  # --- RAG Services ---
  retrieval:
    build:
      context: .
      dockerfile: services/retrieval/Dockerfile
    container_name: rag_retrieval
    env_file: .env
    depends_on:
      - postgres
      - ollama

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: rag_ingestion
    env_file: .env
    depends_on:
      - postgres
      - ollama

  augmentation:
    build:
      context: .
      dockerfile: services/augmentation/Dockerfile
    container_name: rag_augmentation
    env_file: .env
    depends_on:
      - ollama
    volumes:
      - ./services/augmentation:/app/services/augmentation

  generation:
    build:
      context: .
      dockerfile: services/generation/Dockerfile
    container_name: rag_generation
    env_file: .env
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: rag_frontend
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - retrieval

volumes:
  ollama_storage:
  # pg_data is handled by your relative bind mount ./data/pg_data